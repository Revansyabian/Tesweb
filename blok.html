<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Akses Ditolak</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.2.0/crypto-js.min.js"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif}
        body{background:linear-gradient(135deg,#e0f2fe 0%,#bae6fd 50%,#7dd3fc 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
        .card{background:#fff;border-radius:20px;padding:40px 30px;max-width:420px;width:100%;text-align:center;box-shadow:0 25px 60px rgba(0,0,0,0.1)}
        .icon{font-size:70px;color:#ef4444;margin-bottom:20px;animation:pulse 1.5s ease-in-out infinite}
        @keyframes pulse{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.1);opacity:0.8}}
        h1{color:#0c4a6e;font-size:24px;margin-bottom:10px}
        p{color:#64748b;font-size:14px;margin-bottom:25px;line-height:1.5}
        .btn{display:block;width:100%;padding:14px;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;transition:all 0.2s;text-decoration:none;color:#fff;margin-bottom:10px}
        .btn-whatsapp{background:#25D366}
        .btn-whatsapp:hover{background:#128C7E}
        .btn-home{background:deepskyblue}
        .btn-home:hover{background:#0099dd}
        .btn:disabled{opacity:0.5;cursor:not-allowed}
        .loading-text{color:#64748b;font-size:12px;margin-top:5px;display:none}
    </style>
</head>
<body>
    <div class="card">
        <div class="icon"><i class="fas fa-shield-alt"></i></div>
        <h1>AKSES DITOLAK</h1>
        <p id="statusText">Memeriksa status...</p>
        <a href="https://wa.me/6285199120995?text=Assalamualaikum%20admin,%20akses%20saya%20diblokir.%20Mohon%20dibuka%20kembali." class="btn btn-whatsapp"><i class="fab fa-whatsapp"></i> Hubungi Admin</a>
        <button class="btn btn-home" id="btnHome" onclick="checkAndGoHome()" disabled><i class="fas fa-home"></i> <span id="btnHomeText">Cek Akses...</span></button>
        <p class="loading-text" id="loadingText"><i class="fas fa-spinner fa-spin"></i> Memeriksa...</p>
    </div>

    <script>
        var API_REVANSTORE = 'api/revanstore';
        var API_KEY = '2145dd5b-b55d-49f1-9b3f-9543a5840f65';
        var isBlocked = true;

        async function getFingerprint() {
            var fp = '';
            fp += navigator.userAgent || '';
            fp += navigator.language || '';
            fp += (screen.width || 0) + 'x' + (screen.height || 0);
            fp += screen.colorDepth || '';
            fp += new Date().getTimezoneOffset();
            fp += navigator.hardwareConcurrency || '';
            fp += navigator.deviceMemory || '';
            fp += navigator.platform || '';
            return CryptoJS.MD5(fp).toString();
        }

        async function checkBlocked() {
            var fp = await getFingerprint();
            try {
                var res = await fetch(API_REVANSTORE, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'x-api-key': API_KEY, 'X-Fingerprint': fp },
                    body: JSON.stringify({ path: 'check_blocked', method: 'POST', data: { fingerprint: fp } })
                });
                var result = await res.json();
                
                if (result && result.blocked) {
                    isBlocked = true;
                    document.getElementById('statusText').textContent = 'Maaf, akses Anda masih diblokir.';
                    document.getElementById('btnHome').disabled = true;
                    document.getElementById('btnHomeText').textContent = 'Akses Diblokir';
                } else {
                    isBlocked = false;
                    document.getElementById('statusText').textContent = 'Akses Anda sudah dibuka! Silakan kembali.';
                    document.getElementById('btnHome').disabled = false;
                    document.getElementById('btnHomeText').textContent = 'Kembali ke Home';
                }
            } catch(e) {
                document.getElementById('statusText').textContent = 'Gagal memeriksa status. Coba lagi nanti.';
            }
            document.getElementById('loadingText').style.display = 'none';
        }

        function checkAndGoHome() {
            if (!isBlocked) {
                window.location.href = '/';
            } else {
                alert('Akses Anda masih diblokir!');
                checkBlocked();
            }
        }

        checkBlocked();

        setInterval(checkBlocked, 30000);
    </script>
</body>
</html>
